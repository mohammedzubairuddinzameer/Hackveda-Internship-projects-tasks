{% extends "base.html" %}

{% block content %}
<div class="container mt-4">

<h2 class="text-center mb-4">
Chat about: {{ device.name }}
</h2>

<div class="card shadow p-3 mb-3" style="height:400px; overflow-y:auto;">

{% if messages %}
  {% for msg in messages %}

    <div class="mb-2">

      <strong>{{ msg.user.username }}:</strong>
      {{ msg.message }}

      <div class="text-muted small">
        {{ msg.timestamp }}
      </div>

    </div>

  {% endfor %}
{% else %}

  <p class="text-center text-muted">
    No messages yet. Start the conversation.
  </p>

{% endif %}

</div>

<form method="post">
{% csrf_token %}

<div class="input-group">

<input type="text"
       name="message"
       class="form-control"
       placeholder="Type your message..."
       required>

<button class="btn btn-primary">
Send
</button>

</div>

</form>

</div>
{% endblock %}
