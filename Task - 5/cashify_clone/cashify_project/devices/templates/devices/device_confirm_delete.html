{% extends "base.html" %}
{% block content %}

<div class="container mt-5 text-center">
  <h3>Delete {{ device.name }}?</h3>

  <form method="post">
    {% csrf_token %}
    <button class="btn btn-danger">Delete</button>
    <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
  </form>
</div>

{% endblock %}
